name = "real-estate-sender-automation"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# Run as a backup trigger. GitHub Actions remains the primary scheduled runner.
[triggers]
crons = ["20 0 * * 1,3,5"]

[[d1_databases]]
binding = "DB"
database_name = "property-mailer-db"
# Replace after `npx wrangler d1 create property-mailer-db`
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[vars]
GITHUB_WORKFLOW_FILE = "property-mailer.yml"
